# Deploy Jaspr static site to GitHub Pages
# Output: build/jaspr (not Flutter's build/web)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Jaspr static mode only needs Dart (no Flutter)
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # Pin CLI to match jaspr ^0.23.2 in pubspec.yaml
      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli 0.23.2

      - name: Build Jaspr
        run: dart pub global run jaspr_cli:jaspr build --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/jaspr

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
